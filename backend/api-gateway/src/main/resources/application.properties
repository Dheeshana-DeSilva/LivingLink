spring.application.name=api-gateway
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.server.webmvc.routes[0].id=auth-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.server.webmvc.routes[1].id=profile-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://PROFILE-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/profiles/**

spring.cloud.gateway.server.webmvc.routes[2].id=listing-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://LISTING-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/listings/**

spring.cloud.gateway.server.webmvc.routes[3].id=preference-service
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://PREFERENCE-SERVICE
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/preferences/**

management.endpoints.web.exposure.include=*
